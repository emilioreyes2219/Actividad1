<body>
    <h2>Conversión de Kilómetros a Millas</h2>
    <form id="conversionForm">
        <label for="kilometros">Kilómetros:</label>
        
        <input type="number" id="kilometros" placeholder="Ingrese kilómetros" required min="0" step="any">

        <button type="button" onclick="convertir()">Convertir</button>

        <label for="millas">Millas:</label>
        <input type="text" id="millas" readonly>
    </form>
