<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio12</title>
   
    <link rel="stylesheet" href="css/ejercicio12.css">
    <script src="js/ejercicio12.js"></script>
</head>
<body>
    <h2>Conversión de Pesos Mexicanos a Dólares</h2>
    <form id="conversionForm">
        <label for="pesos">Pesos (MXN):</label>
       
        <input type="number" id="pesos" placeholder="Ingrese cantidad en MXN" required min="0" step="any">

        <button type="button" onclick="convertir()">Convertir</button>

        <label for="dolares">Dólares (USD):</label>
        <input type="text" id="dolares" readonly>
    </form>

    
</body>
</html>
