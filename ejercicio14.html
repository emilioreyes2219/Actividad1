<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 14</title>
    <link rel="stylesheet" href="css/ejercicio14.css">
    <script src="js/ejercicio14.js"></script>
</head>
<body>
    <h2>Operaciones con números</h2>
    <form id="formNumeros">
        <label for="numeros">Ingrese números separados por comas:</label>
        <input type="text" id="numeros" placeholder="Ej: 10,20,30" required>

        <button type="button" onclick="calcular()">Calcular</button>

        <label for="mayor">Número mayor:</label>
        <input type="text" id="mayor" readonly>

        <label for="menor">Número menor:</label>
        <input type="text" id="menor" readonly>

        <label for="promedio">Promedio:</label>
        <input type="text" id="promedio" readonly>
    </form>
    
</body>
</html>
